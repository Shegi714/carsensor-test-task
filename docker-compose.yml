services:
  postgres:
    image: postgres:16
    container_name: cars-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cars_db
      POSTGRES_USER: cars_user
      POSTGRES_PASSWORD: cars_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cars-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pg_data:
